<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartel QR - Nexo Ajustado</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;800&display=swap" rel="stylesheet">
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f3f4f6;
        margin: 0;
        font-family: 'Montserrat', sans-serif;
    }
    .cartel {
        background-color: #111111;
        width: 360px;
        border-radius: 16px;
        box-shadow: 0 20px 45px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-sizing: border-box;
    }
    .contenido-superior {
        padding: 45px 20px 25px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .header {
        text-align: center;
        margin-bottom: 25px;
        width: 100%;
    }
    .linea1 {
        font-size: 28px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.5px;
        display: block;
        line-height: 1.2;
        white-space: nowrap;
    }
    .linea2 {
        font-size: 22px;
        font-weight: 400;
        color: #e0e0e0;
        display: block;
        margin-top: 6px;
    }
    .qr-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
    }
    /* El tamaño que evita que el SVG explote */
    .qr-container svg {
        width: 245px;
        height: 245px;
    }
    .barra-division {
        width: 100%;
        height: 12px;
        background-color: #ffffff;
    }
    .footer {
        background-color: #050505;
        padding: 12px 0;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .ig-logo {
        width: 16px;
        height: 16px;
        fill: #888888;
    }
    .handle {
        font-size: 13px;
        font-weight: 300;
        color: #888888;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="cartel">
    
    <div class="contenido-superior">
        <div class="header">
            <span class="linea1">Súmate a nexo</span>
            <span class="linea2">y ganá</span>
        </div>
        <div class="qr-container">
